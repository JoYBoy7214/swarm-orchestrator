version: '3.8'

services:
  nats:
    image: nats:alpine  
    command: ["-js", "-DV", "-m", "8222", "-sd", "/data"] 
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats-data:/data 
    networks:             
      - ai_pipeline

  qdrant:
    image: qdrant/qdrant:latest 
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_db:/qdrant/storage
    env_file:
      - qdrant_DB.env
    networks:             
      - ai_pipeline

volumes:
  qdrant_db:             

networks:                
  ai_pipeline:
    driver: bridge